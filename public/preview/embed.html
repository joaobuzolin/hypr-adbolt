<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tag preview (embed)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; }
  </style>
</head>
<body><script>
  // Inline, blocking script inside <body>. Runs during the initial HTML parse,
  // which is the only window where document.write() is valid. We need to be
  // inside that window because some 3P ad loaders (notably CM360's dcmads.js)
  // call document.write() themselves to inject the creative iframe. If the
  // <script src="dcmads.js"> tag is appended to the DOM after parse (the
  // innerHTML + re-create-script trick), the browser blocks its document.write
  // with "Failed to execute 'write' on 'Document': …asynchronously-loaded…"
  // and the preview stays blank.
  //
  // By writing the tag HTML straight into the parse stream, the embedded
  // <script src="dcmads.js"> is parsed as an inline doc script: the parser
  // blocks, fetches it, executes it during the parse, and its document.write
  // succeeds.
  (function () {
    function decodeBase64Url(s) {
      var b64 = s.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((s.length + 3) % 4);
      return decodeURIComponent(escape(atob(b64)));
    }

    var params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    var tagB64 = params.get('tag');
    var w = parseInt(params.get('w') || '0', 10) || 300;
    var h = parseInt(params.get('h') || '0', 10) || 250;

    // Lock html/body to the exact tag dimensions so the containing iframe
    // shows no scrollbars and the tag lays out as if on a real page.
    document.documentElement.style.width = w + 'px';
    document.documentElement.style.height = h + 'px';
    document.body.style.width = w + 'px';
    document.body.style.height = h + 'px';

    if (!tagB64) return;

    var tagHtml;
    try {
      tagHtml = decodeBase64Url(tagB64);
    } catch (e) {
      document.body.appendChild(document.createTextNode('Preview: decode error — ' + e.message));
      return;
    }

    // document.write is the whole point of this file. See block comment above.
    document.write(tagHtml);
  })();
</script></body>
</html>
