<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AdBolt · Tag Renderer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  </style>
</head>
<body>
  <script>
    (function () {
      function postToParent(type, payload) {
        try { parent.postMessage({ source: 'adbolt-render-tag', type: type, payload: payload || {} }, '*'); } catch (e) {}
      }
      postToParent('boot', { href: location.href, time: Date.now() });

      function parseFragment() {
        var frag = window.location.hash.replace(/^#/, '');
        var params = {};
        frag.split('&').forEach(function (kv) {
          if (!kv) return;
          var eq = kv.indexOf('=');
          if (eq < 0) return;
          params[decodeURIComponent(kv.slice(0, eq))] = decodeURIComponent(kv.slice(eq + 1));
        });
        return params;
      }

      function b64DecodeUtf8(b64) {
        try {
          var binary = atob(b64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return new TextDecoder('utf-8').decode(bytes);
        } catch (e) { return null; }
      }

      var params = parseFragment();
      if (!params.tag) { postToParent('error', { reason: 'missing-tag' }); return; }

      var tagHtml = b64DecodeUtf8(params.tag);
      if (!tagHtml) { postToParent('error', { reason: 'decode-failed' }); return; }

      var w = parseInt(params.w, 10) || 300;
      var h = parseInt(params.h, 10) || 250;
      postToParent('decoded', { w: w, h: h, tagLen: tagHtml.length });

      document.documentElement.style.width = w + 'px';
      document.documentElement.style.height = h + 'px';
      document.body.style.width = w + 'px';
      document.body.style.height = h + 'px';

      // --- Fast path: CM360 iframe-rendering-mode tags ---
      //
      // The dcmads.js script the tag loads from googletagservices.com does some
      // client-side state management that causes the 2nd+ call in the same
      // top-window to silently no-op, even if each call is inside a freshly
      // created nested iframe with a unique URL. The sub-iframe gets created
      // but its src is never set, so the ad never shows.
      //
      // For CM360 tags in iframe mode, we can skip dcmads entirely and hit
      // the ad server directly. The URL format is well-known and the same one
      // dcmads would have built. Appending ;ord=<random>? forces a new
      // impression every time, so no caching / freq-cap confusion.
      //
      // Any tag that is not CM360 iframe mode falls through to the original
      // dcmads path (document.write the tag into a sub-iframe).
      var placementMatch = tagHtml.match(/data-dcm-placement=['"]([^'"]+)['"]/);
      var renderingModeMatch = tagHtml.match(/data-dcm-rendering-mode=['"]([^'"]+)['"]/);
      var isCm360Iframe = placementMatch && renderingModeMatch && renderingModeMatch[1] === 'iframe';

      if (isCm360Iframe) {
        var placement = placementMatch[1];
        var ord = Math.floor(Math.random() * 1e13).toString();
        // /ddm/adi/ is the "ad iframe" endpoint — returns an HTML page that
        // the browser can render directly in an iframe. /ddm/adj/ is the JS
        // variant, /ddm/ad/ is the "expandable" mode. adi is what we want.
        var directUrl = 'https://ad.doubleclick.net/ddm/adi/' + placement
          + ';sz=' + w + 'x' + h
          + ';ord=' + ord + '?';

        var adFrame = document.createElement('iframe');
        adFrame.src = directUrl;
        adFrame.width = w;
        adFrame.height = h;
        adFrame.style.border = 'none';
        adFrame.style.display = 'block';
        adFrame.setAttribute('scrolling', 'no');
        adFrame.setAttribute('marginwidth', '0');
        adFrame.setAttribute('marginheight', '0');
        adFrame.onload = function () {
          postToParent('direct-loaded', { url: directUrl.slice(0, 200) });
        };
        adFrame.onerror = function () {
          postToParent('direct-error', { url: directUrl.slice(0, 200) });
        };
        document.body.appendChild(adFrame);

        postToParent('direct', { url: directUrl.slice(0, 200) });

        // Report rendered status after 3s (good enough for ad server response).
        setTimeout(function () {
          postToParent('probe', {
            at: 3000,
            mode: 'direct',
            iframeSrcSet: !!adFrame.src,
            // We can't read contentDocument because it's cross-origin, which
            // is expected and fine. If the iframe didn't error out, the ad
            // server served something.
          });
        }, 3000);
        return;
      }

      // --- Fallback: dcmads path (non-CM360 or unknown tags) ---
      var host = document.createElement('iframe');
      host.width = w;
      host.height = h;
      host.style.border = 'none';
      host.style.display = 'block';
      host.setAttribute('scrolling', 'no');
      document.body.appendChild(host);

      var doc = host.contentDocument;
      if (!doc) { postToParent('error', { reason: 'no-contentdoc' }); return; }

      var wrapped =
        '<!DOCTYPE html><html><head><meta charset="utf-8"><base target="_blank">'
        + '<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}'
        + 'html,body{width:' + w + 'px;height:' + h + 'px;overflow:hidden;background:transparent}'
        + '</style></head><body>' + tagHtml + '</body></html>';
      doc.open();
      doc.write(wrapped);
      doc.close();
      postToParent('written', { htmlLen: wrapped.length, mode: 'dcmads' });

      setTimeout(function () {
        try {
          var subIframes = doc.querySelectorAll('iframe');
          var bodyHtmlLen = doc.body ? doc.body.innerHTML.length : 0;
          postToParent('probe', {
            at: 3000, mode: 'dcmads',
            subIframeCount: subIframes.length,
            bodyHtmlLen: bodyHtmlLen,
          });
        } catch (e) { postToParent('probe-error', { msg: String(e) }); }
      }, 3000);
    })();
  </script>
</body>
</html>
