<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AdBolt · Tag Renderer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  </style>
</head>
<body>
  <!--
    Renders a 3P ad tag passed in the URL fragment (base64 + URL-encoded).
    Loaded in an iframe by the CreativePreviewModal component.

    Why a separate page and not srcdoc / document.write in the React component
    directly: React creates iframes via JS, which races Chrome's about:blank
    initialization. A real HTTP-served page sidesteps that entirely. Debug
    pages proved this.

    Why, for CM360 tags, we bypass dcmads.js and call the ad server directly:
    dcmads.js has client-side state that causes it to silently no-op on the
    2nd+ call within the same top window. Hitting ad.doubleclick.net/ddm/adi
    ourselves with a fresh `ord` param on every open avoids the problem —
    the ad server treats each call as a new impression and always responds.

    Error reporting: if the fragment cannot be decoded, we postMessage an
    `error` event to the parent so the modal can show a red bar instead of
    a silent blank. Normal operation posts nothing.
  -->
  <script>
    (function () {
      function post(type, payload) {
        try { parent.postMessage({ source: 'adbolt-render-tag', type: type, payload: payload || {} }, '*'); } catch (e) {}
      }

      function parseFragment() {
        var frag = window.location.hash.replace(/^#/, '');
        var params = {};
        frag.split('&').forEach(function (kv) {
          if (!kv) return;
          var eq = kv.indexOf('=');
          if (eq < 0) return;
          params[decodeURIComponent(kv.slice(0, eq))] = decodeURIComponent(kv.slice(eq + 1));
        });
        return params;
      }

      function b64DecodeUtf8(b64) {
        try {
          var binary = atob(b64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return new TextDecoder('utf-8').decode(bytes);
        } catch (e) { return null; }
      }

      var params = parseFragment();
      if (!params.tag) { post('error', { reason: 'missing-tag' }); return; }

      var tagHtml = b64DecodeUtf8(params.tag);
      if (!tagHtml) { post('error', { reason: 'decode-failed' }); return; }

      var w = parseInt(params.w, 10) || 300;
      var h = parseInt(params.h, 10) || 250;

      document.documentElement.style.width = w + 'px';
      document.documentElement.style.height = h + 'px';
      document.body.style.width = w + 'px';
      document.body.style.height = h + 'px';

      // Fast path — CM360 iframe-rendering-mode tags. Parse the placement,
      // build the /ddm/adi URL ourselves, and point an iframe straight at it.
      var placementMatch = tagHtml.match(/data-dcm-placement=['"]([^'"]+)['"]/);
      var renderingModeMatch = tagHtml.match(/data-dcm-rendering-mode=['"]([^'"]+)['"]/);
      var isCm360Iframe = placementMatch && renderingModeMatch && renderingModeMatch[1] === 'iframe';

      if (isCm360Iframe) {
        // Go through our own /api/ad-proxy edge function so the iframe that
        // displays the creative loads from adbolt.hypr.mobi (same-origin),
        // not from ad.doubleclick.net. This removes Chrome's cross-origin
        // partitioning from the equation: successive preview opens no longer
        // share or inherit any state that would cause the 2nd+ creative to
        // stay hidden. Each call has its own ord so the ad server also sees
        // a fresh impression.
        var ord = Math.floor(Math.random() * 1e13).toString();
        var proxyUrl = '/api/ad-proxy?placement=' + encodeURIComponent(placementMatch[1])
          + '&sz=' + w + 'x' + h
          + '&ord=' + ord;

        var adFrame = document.createElement('iframe');
        adFrame.src = proxyUrl;
        adFrame.width = w;
        adFrame.height = h;
        adFrame.style.border = 'none';
        adFrame.style.display = 'block';
        adFrame.setAttribute('scrolling', 'no');
        adFrame.setAttribute('marginwidth', '0');
        adFrame.setAttribute('marginheight', '0');
        document.body.appendChild(adFrame);
        return;
      }

      // Fallback — non-CM360 tag or CM360 script-mode. Let the tag's own
      // loader script run in a sub-iframe via document.write.
      var host = document.createElement('iframe');
      host.width = w;
      host.height = h;
      host.style.border = 'none';
      host.style.display = 'block';
      host.setAttribute('scrolling', 'no');
      document.body.appendChild(host);

      var doc = host.contentDocument;
      if (!doc) { post('error', { reason: 'no-contentdoc' }); return; }

      var wrapped =
        '<!DOCTYPE html><html><head><meta charset="utf-8"><base target="_blank">'
        + '<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}'
        + 'html,body{width:' + w + 'px;height:' + h + 'px;overflow:hidden;background:transparent}'
        + '</style></head><body>' + tagHtml + '</body></html>';
      doc.open();
      doc.write(wrapped);
      doc.close();
    })();
  </script>
</body>
</html>
